<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" c"width=device-width, initial-scale=1.0">
<title>Dungeon Knight Adventure</title>

<style>
body{
    margin:0;
    overflow:hidden;
    background:black;
    font-family:Arial;
    color:white;
}

canvas{
    display:block;
    margin:auto;
    margin-top:20px;
    background:#141010;
    border:4px solid white;
}

#ui{
    position:absolute;
    top:10px;
    left:10px;
    font-size:22px;
    line-height:1.5;
}

#shop{
    position:absolute;
    right:10px;
    top:10px;
    width:240px;
    background:#1a1a1a;
    border:2px solid white;
    border-radius:10px;
    padding:15px;
}

button{
    width:100%;
    margin-top:10px;
    padding:10px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-size:16px;
}

#message{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    text-align:center;
    display:none;
}

#message h1{
    font-size:70px;
    color:red;
}
</style>
</head>
<body>

<div id="ui">
    HP: <span id="hp">100</span><br>
    Gold: <span id="coins">0</span><br>
    Score: <span id="score">0</span>
</div>

<div id="shop">
    <h2>🛒 SHOP</h2>

    <button "buyHeal()">❤️ Heal (20)</button>
    <button "buySword()">⚔️ Strong Sword (40)</button>
    <button "buySpeed()">⚡ Speed Boost (50)</button>
    <button "buyShield()">🛡️ Magic Shield (60)</button>
    <button "buyMega()">💥 Mega Slash (80)</button>
</div>

<div id="message">
    <h1>GAME OVER</h1>
    <p>Press SPACE to Restart</p>
</div>

<canvas id="game" width="1300" height="700"></canvas>

<script>
const canvas = getElementById("game");
const ctx = canvas.getContext("2d");

const hpUI = getElementById("hp");
const coinsUI = getElementById("coins");
const scoreUI = getElementById("score");

let gameRunning = true;

const keys = {};

let score = 0;
let coins = 0;

let swordDamage = 10;
let megaSlash = false;
let shield = false;

const player = {
    x:600,
    y:350,
    width:45,
    height:45,
    speed:5,
    hp:100,
    color:"#00ffee"
};

let monsters = [];
let traps = [];
let slashEffect = null;

addEventListener("keydown", e => {

    keys[e.key] = true;

    if(e.code === "Space" && gameRunning){
        attack();
    }

    if(e.code === "Space" && !gameRunning){
        restartGame();
    }
});

addEventListener("keyup", e => {
    keys[e.key] = false;
});

function attack(){

    slashEffect = {
        x:player.x - 30,
        y:player.y - 30,
        size:megaSlash ? 120 : 80,
        timer:10
    };

    monsters.forEach((m,index) => {

        let dx = player.x - m.x;
        let dy = player.y - m.y;

        let distance = Math.sqrt(dx*dx + dy*dy);

        let range = megaSlash ? 120 : 80;

        if(distance < range){

            m.hp -= swordDamage;

            if(m.hp <= 0){

                monsters.splice(index,1);

                score += 20;
                coins += 10;
            }
        }
    });
}

function spawnMonster(){

    monsters.push({
        x:Math.random() * (canvas.width - 50),
        y:Math.random() * (canvas.height - 50),
        width:40,
        height:40,
        speed:2 + Math.random()*1.5,
        hp:20,
        color:"#ff3355"
    });
}

function spawnTrap(){

    traps.push({
        x:Math.random() * (canvas.width - 50),
        y:Math.random() * (canvas.height - 50),
        width:40,
        height:40
    });
}

setInterval(() => {

    if(gameRunning){

        spawnMonster();

        if(score > 300){
            spawnMonster();
        }
    }

}, 1200);

setInterval(() => {

    if(gameRunning && traps.length < 8){

        spawnTrap();
    }

}, 2500);

function drawPlayer(){

    ctx.fillStyle = shield ? "#00ff00" : player.color;

    ctx.fillRect(player.x,player.y,player.width,player.height);
}

function drawMonsters(){

    monsters.forEach(m => {

        ctx.fillStyle = m.color;

        ctx.fillRect(m.x,m.y,m.width,m.height);
    });
}

function drawTraps(){

    traps.forEach(t => {

        ctx.fillStyle = "orange";

        ctx.fillRect(t.x,t.y,t.width,t.height);
    });
}

function drawSlash(){

    if(slashEffect){

        ctx.beginPath();

        ctx.arc(
            player.x + player.width/2,
            player.y + player.height/2,
            slashEffect.size,
            0,
            Math.PI*2
        );

        ctx.strokeStyle = "yellow";
        ctx.lineWidth = 5;
        ctx.stroke();

        slashEffect.timer--;

        if(slashEffect.timer <= 0){
            slashEffect = null;
        }
    }
}

function updatePlayer(){

    if(keys["ArrowUp"] && player.y > 0){
        player.y -= player.speed;
    }

    if(keys["ArrowDown"] && player.y + player.height < canvas.height){
        player.y += player.speed;
    }

    if(keys["ArrowLeft"] && player.x > 0){
        player.x -= player.speed;
    }

    if(keys["ArrowRight"] && player.x + player.width < canvas.width){
        player.x += player.speed;
    }
}

function updateMonsters(){

    monsters.forEach(m => {

        let dx = player.x - m.x;
        let dy = player.y - m.y;

        let distance = Math.sqrt(dx*dx + dy*dy);

        m.x += dx / distance * m.speed;
        m.y += dy / distance * m.speed;

        if(
            player.x < m.x + m.width &&
            player.x + player.width > m.x &&
            player.y < m.y + m.height &&
            player.y + player.height > m.y
        ){

            if(shield){
                shield = false;
            }else{
                player.hp -= 1;
            }
        }
    });
}

function updateTraps(){

    traps.forEach(t => {

        if(
            player.x < t.x + t.width &&
            player.x + player.width > t.x &&
            player.y < t.y + t.height &&
            player.y + player.height > t.y
        ){

            player.hp -= 1;
        }
    });

    if(player.hp <= 0){
        endGame();
    }
}

function drawDungeon(){

    for(let i=0;i<100;i++){

        ctx.fillStyle = "#222";

        ctx.fillRect(
            (i*97)%canvas.width,
            (i*53)%canvas.height,
            40,
            40
        );
    }
}

function updateUI(){

    hpUI.innerText = player.hp;
    coinsUI.innerText = coins;
    scoreUI.innerText = score;
}

function buyHeal(){

    if(coins >= 20){

        coins -= 20;

        player.hp = Math.min(100, player.hp + 20);
    }
}

function buySword(){

    if(coins >= 40){

        coins -= 40;

        swordDamage += 10;
    }
}

function buySpeed(){

    if(coins >= 50){

        coins -= 50;

        player.speed += 2;
    }
}

function buyShield(){

    if(coins >= 60){

        coins -= 60;

        shield = true;
    }
}

function buyMega(){

    if(coins >= 80){

        coins -= 80;

        megaSlash = true;
    }
}

function endGame(){

    gameRunning = false;

    getElementById("message").style.display = "block";
}

function restartGame(){

    player.hp = 100;
    player.speed = 5;

    player.x = 600;
    player.y = 350;

    swordDamage = 10;

    monsters = [];
    traps = [];

    score = 0;
    coins = 0;

    megaSlash = false;
    shield = false;

    gameRunning = true;

    getElementById("message").style.display = "none";

    animate();
}

function animate(){

    if(!gameRunning) return;

    ctx.clearRect(0,0,canvas.width,canvas.height);

    drawDungeon();

    updatePlayer();
    updateMonsters();
    updateTraps();

    drawPlayer();
    drawMonsters();
    drawTraps();
    drawSlash();

    updateUI();

    requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
